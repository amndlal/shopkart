<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura Shopping</title>
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%231a1a2e'/><path d='M15 70h12l4-30h38l-4 30' fill='none' stroke='%23666' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/><circle cx='35' cy='78' r='4' fill='%23666'/><circle cx='60' cy='78' r='4' fill='%23666'/><text x='50' y='58' font-size='45' font-family='Arial' fill='%23ffcc00' text-anchor='middle' font-weight='bold'>+</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ============ HEADER ============ -->
  <header class="header">
    <div class="header-inner">
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu">&#9776;</button>
      <a href="#" class="logo" id="logoBtn">
        <span class="logo-main" id="logoMain">aura shopping</span>
        <span class="logo-sub">aura<em>+</em></span>
      </a>
      <form class="search" id="searchForm">
        <input type="text" id="searchInput" placeholder="Search for products, brands and more" autocomplete="off" />
        <button type="submit" class="search-btn" aria-label="Search">&#128269;</button>
      </form>
      <button class="icon-btn header-link" id="wishlistBtn">&#9825; <span class="hide-sm">Wishlist</span></button>
      <button class="icon-btn header-link" id="cartBtn">
        &#128722; <span class="hide-sm">Cart</span>
        <span class="badge" id="cartBadge">0</span>
      </button>
      <button class="icon-btn header-link" id="adminBtn">&#9881; <span class="hide-sm">Admin</span></button>
    </div>
    <nav class="catbar" id="catbar"></nav>
  </header>

  <!-- ============ MAIN ============ -->
  <main id="view"></main>

  <!-- ============ FOOTER ============ -->
  <footer class="footer">
    <p id="footerText">Aura Shopping — premium picks, best prices.</p>
    <p class="footer-sub">All data is stored locally in your browser. Use Admin → Export to back up your catalog.</p>
  </footer>

  <!-- ============ CART DRAWER ============ -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="cartDrawer">
    <div class="drawer-head">
      <h3>My Cart</h3>
      <button class="icon-btn" id="closeCart">&times;</button>
    </div>
    <div class="drawer-body" id="cartItems"></div>
    <div class="drawer-foot">
      <div class="cart-total"><span>Total</span><strong id="cartTotal">₹0</strong></div>
      <button class="btn-primary block" id="checkoutBtn">Place Order</button>
    </div>
  </aside>

  <!-- ============ TOAST ============ -->
  <div class="toast" id="toast"></div>

  <script src="js/store.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
